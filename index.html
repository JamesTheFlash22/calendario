<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Elenco Compiti e Verifiche</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>📋 Elenco Compiti e Verifiche</header>
    <div id="task-container">
        <div id="task-list"></div>
    </div>
    <button id="addTaskBtn">+</button>
    <button id="logoutBtn">🚪</button>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h2>Login Admin</h2>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <p id="loginError" style="color: red; display: none;"></p>
            <div class="button-group">
                <button id="submitLogin" class="saveBtn">Accedi</button>
                <button id="cancelLogin" class="cancelBtn">Annulla</button>
            </div>
        </div>
    </div>

    <div id="eventModal" class="modal">
        <div class="modal-content">
            <h2 id="eventModalTitle">Nuovo Compito/Verifica</h2>
            <div class="form-grid">
                <div class="full-width">
                    <input type="text" id="eventTitle" placeholder="Titolo (obbligatorio)">
                </div>
                <div class="full-width">
                    <textarea id="eventDesc" placeholder="Descrizione (opzionale)"></textarea>
                </div>
                <div>
                    <input type="date" id="eventDate">
                </div>
                <div>
                    <select id="eventStartTime" class="time-select">
                        <option value="">Seleziona ora inizio</option>
                        <option value="08:00">Prima ora (8:00)</option>
                        <option value="09:00">Seconda ora (9:00)</option>
                        <option value="10:00">Terza ora (10:00)</option>
                        <option value="11:00">Quarta ora (11:00)</option>
                        <option value="12:00">Quinta ora (12:00)</option>
                        <option value="13:00">Sesta ora (13:00)</option>
                    </select>
                </div>
                <div>
                    <select id="eventEndTime" class="time-select">
                        <option value="">Seleziona ora fine</option>
                        <option value="09:00">Prima ora (9:00)</option>
                        <option value="10:00">Seconda ora (10:00)</option>
                        <option value="11:00">Terza ora (11:00)</option>
                        <option value="12:00">Quarta ora (12:00)</option>
                        <option value="13:00">Quinta ora (13:00)</option>
                        <option value="14:00">Sesta ora (14:00)</option>
                    </select>
                </div>
                <div class="full-width button-group">
                    <button class="saveBtn" id="saveEvent">Salva</button>
                    <button class="cancelBtn" id="cancelEvent">Annulla</button>
                </div>
            </div>
        </div>
    </div>

    <div id="eventViewModal" class="modal">
        <div class="eventModalContent">
            <button class="closeEventModal" id="closeEventModal">✖</button>
            <h3 id="viewTitle"></h3>
            <p id="viewTime"></p>
            <p id="viewDesc"></p>
            <button class="editBtn" id="editEventBtn">✏️ Modifica</button>
            <button class="deleteBtn" id="deleteEventBtn">🗑 Elimina</button>
        </div>
    </div>

    <div id="customAlert">
        <div class="alertContent">
            <p id="alertMessage"></p>
            <button onclick="closeCustomAlert()">Chiudi</button>
        </div>
    </div>

    <script>
        const API_URL = 'https://asdlajdkja.mx-labs.net/api/events';
        const API_KEY = '7391';
        let pendingDeleteEvent = null;
        let editMode = false;
        let editingEventId = null;

        function showCustomAlert(msg) {
            document.getElementById('alertMessage').textContent = msg;
            document.getElementById('customAlert').style.display = 'flex';
        }

        function closeCustomAlert() {
            document.getElementById('customAlert').style.display = 'none';
        }

        function isLoggedIn() {
            return !!localStorage.getItem('username');
        }

        function showLoginModal() {
            document.getElementById('loginModal').style.display = 'flex';
        }

        function hideLoginModal() {
            document.getElementById('loginModal').style.display = 'none';
            document.getElementById('loginError').style.display = 'none';
        }

        function toggleAdminUI() {
            const logoutBtn = document.getElementById('logoutBtn');
            const addTaskBtn = document.getElementById('addTaskBtn');
            if (isLoggedIn()) {
                logoutBtn.style.display = 'block';
                addTaskBtn.style.display = 'block';
            } else {
                logoutBtn.style.display = 'none';
                addTaskBtn.style.display = 'block';
            }
        }

        async function loadTasks() {
            const taskList = document.getElementById('task-list');
            taskList.innerHTML = '';
            try {
                let headers = {};
                if (isLoggedIn()) {
                    headers = { 'username': localStorage.getItem('username') };
                }
                const res = await fetch(`${API_URL}/all`, { headers });
                let tasks = await res.json();

                // 📌 Ordina eventi dal più recente al più vecchio (passati compresi)
                tasks.sort((a, b) => new Date(b.start) - new Date(a.start));

                tasks.forEach(task => {
                    const taskItem = document.createElement('div');
                    taskItem.className = 'task-item';
                    const startDate = new Date(task.start).toLocaleDateString('it-IT');
                    const startTime = new Date(task.start).toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
                    const endTime = task.end ? new Date(task.end).toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' }) : 'N/A';
                    taskItem.innerHTML = `
                        <div>
                            <h3>${task.title}</h3>
                            <p><strong>Data:</strong> ${startDate}</p>
                            <p><strong>Orario:</strong> ${startTime} - ${endTime}</p>
                            <p>${task.description || '(nessuna descrizione)'}</p>
                        </div>
                        ${isLoggedIn() ? `<button class="editBtn" data-id="${task.id}">✏️</button><button class="deleteBtn" data-id="${task.id}">🗑</button>` : ''}
                    `;
                    taskList.appendChild(taskItem);
                });
            } catch (err) {
                showCustomAlert('Errore nel caricamento dei compiti.');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            toggleAdminUI();
            loadTasks();

            // 🔄 Auto-clear cookies + localStorage ogni 10 minuti
            setInterval(() => {
                document.cookie.split(";").forEach(cookie => {
                    const eqPos = cookie.indexOf("=");
                    const name = eqPos > -1 ? cookie.substr(0, eqPos) : cookie;
                    document.cookie = name + "=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/";
                });
                localStorage.clear();
                console.log("Cookies e localStorage cancellati automaticamente");
                location.reload(); // 🔁 aggiorna la pagina
            }, 10 * 60 * 1000);
        });
    </script>
</body>
</html>
